<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maafin Aku Yaa Handayani 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #ffb6c1;
            font-size: 14px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 182, 193, 0.3);
            pointer-events: none;
        }
        
        #info h1 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #ff69b4;
            text-shadow: 0 0 10px #ff69b4;
        }
        
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff69b4;
            font-size: 24px;
            z-index: 200;
            text-align: center;
        }
        
        .heart {
            display: inline-block;
            animation: heartbeat 1.5s ease-in-out infinite;
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #1a0a1a 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 300;
            cursor: pointer;
        }
        
        #start-overlay h2 {
            color: #ff69b4;
            font-size: 36px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ff69b4;
        }
        
        #start-overlay p {
            color: #ffb6c1;
            font-size: 18px;
        }
        
        #start-overlay .click-hint {
            margin-top: 30px;
            padding: 15px 30px;
            border: 2px solid #ff69b4;
            border-radius: 30px;
            color: #ff69b4;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="heart">💕</div><br>
        Loading Universe...
    </div>
    
    <div id="start-overlay">
        <h2>Maafin Aku Yaa Handayani</h2>
        <p></p>
        <div class="click-hint">klik apa bae</div>
    </div>
    
    <div id="info">
        <h1>💕 for Sri Handa Yani</h1>
    </div>
    
    <div id="canvas-container"></div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        const imageUrls = [
            'foto1.jpg',
            'foto2.jpg',
            'foto3.jpg',
            'foto4.jpg',
            'foto5.jpg',
            'foto6.jpg',
            'foto7.jpg',
            'foto8.jpg',
            'foto9.jpg',
            'foto10.jpg'
        ];
        
        const musicUrl = 'musik.mp3';
        
        let scene, camera, renderer, controls;
        let sun, sunGroup, photoMeshes = [];
        let starMesh;
        let audio;
        let apologyTexts = [];
        
        const apologyWords = [
            "Maafin Aku Yaa",
            "Aku Sayang Kamu",
            "Handayani Cantik",
            "Jangan Marah Lagi",
            "Aku Kangen Kamu",
            "Maaf Yah Sayang",
            "Love You Handayani",
            "Kamu Lucu Deh",
            "Aku Salah Nih",
            "Pipis Handayani",
            "Maaf Yah Cantik",
            "Jangan Ngambek",
            "Aku Cinta Kamu",
            "Handayani Ku",
            "Maafin Yah Sayang",
            "Kamu Manis Bgt",
            "Aku Janji Baik",
            "Love You Sayang",
            "Handayani Imut",
            "Maaf Yah Sayangku"
        ];
        
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.0005);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 50, 150);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = false;
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 20;
            controls.maxDistance = 500;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;
            
            const ambientLight = new THREE.AmbientLight(0x404040, 2);
            scene.add(ambientLight);
            
            const pointLight = new THREE.PointLight(0xff69b4, 3, 300);
            pointLight.position.set(0, 0, 0);
            scene.add(pointLight);
            
            createCutePinkSun();
            createStarfield();
            createOrbitingApologyTexts();
            createPhotoGalaxy();
            
            window.addEventListener('resize', onWindowResize, false);
            
            animate();
        }
        
        function createCutePinkSun() {
            sunGroup = new THREE.Group();
            
            const geometry = new THREE.SphereGeometry(12, 32, 32);
            const material = new THREE.MeshBasicMaterial({
                color: 0xff69b4,
                transparent: true,
                opacity: 0.9
            });
            
            sun = new THREE.Mesh(geometry, material);
            sunGroup.add(sun);
            
            const innerGlowGeo = new THREE.SphereGeometry(14, 16, 16);
            const innerGlowMat = new THREE.MeshBasicMaterial({
                color: 0xff1493,
                transparent: true,
                opacity: 0.4
            });
            const innerGlow = new THREE.Mesh(innerGlowGeo, innerGlowMat);
            sunGroup.add(innerGlow);
            
            const midGlowGeo = new THREE.SphereGeometry(18, 16, 16);
            const midGlowMat = new THREE.MeshBasicMaterial({
                color: 0xff69b4,
                transparent: true,
                opacity: 0.2
            });
            const midGlow = new THREE.Mesh(midGlowGeo, midGlowMat);
            sunGroup.add(midGlow);
            
            const outerGlowGeo = new THREE.SphereGeometry(25, 16, 16);
            const outerGlowMat = new THREE.MeshBasicMaterial({
                color: 0xffb6c1,
                transparent: true,
                opacity: 0.15
            });
            const outerGlow = new THREE.Mesh(outerGlowGeo, outerGlowMat);
            sunGroup.add(outerGlow);
            
            const cheekGeo = new THREE.SphereGeometry(2, 8, 8);
            const cheekMat = new THREE.MeshBasicMaterial({
                color: 0xffa0b0,
                transparent: true,
                opacity: 0.6
            });
            
            const leftCheek = new THREE.Mesh(cheekGeo, cheekMat);
            leftCheek.position.set(-4, -2, 10);
            sunGroup.add(leftCheek);
            
            const rightCheek = new THREE.Mesh(cheekGeo, cheekMat);
            rightCheek.position.set(4, -2, 10);
            sunGroup.add(rightCheek);
            
            const eyeGeo = new THREE.SphereGeometry(1, 8, 8);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            
            const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
            leftEye.position.set(-3, 2, 11);
            sunGroup.add(leftEye);
            
            const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
            rightEye.position.set(3, 2, 11);
            sunGroup.add(rightEye);
            
            const pupilGeo = new THREE.SphereGeometry(0.5, 8, 8);
            const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            
            const leftPupil = new THREE.Mesh(pupilGeo, pupilMat);
            leftPupil.position.set(-3, 2, 11.5);
            sunGroup.add(leftPupil);
            
            const rightPupil = new THREE.Mesh(pupilGeo, pupilMat);
            rightPupil.position.set(3, 2, 11.5);
            sunGroup.add(rightPupil);
            
            const smileCurve = new THREE.EllipseCurve(
                0, -4,
                3, 1.5,
                0, Math.PI,
                false,
                0
            );
            
            const smilePoints = smileCurve.getPoints(50);
            const smileGeo = new THREE.BufferGeometry().setFromPoints(smilePoints);
            const smileMat = new THREE.LineBasicMaterial({ color: 0xff1493, linewidth: 3 });
            const smile = new THREE.Line(smileGeo, smileMat);
            smile.position.z = 11;
            sunGroup.add(smile);
            
            for (let i = 0; i < 8; i++) {
                const bubbleGeo = new THREE.SphereGeometry(0.5 + Math.random() * 0.5, 8, 8);
                const bubbleMat = new THREE.MeshBasicMaterial({
                    color: 0xff69b4,
                    transparent: true,
                    opacity: 0.6
                });
                const bubble = new THREE.Mesh(bubbleGeo, bubbleMat);
                
                const angle = (i / 8) * Math.PI * 2;
                const radius = 20 + Math.random() * 10;
                bubble.position.x = Math.cos(angle) * radius;
                bubble.position.y = Math.sin(angle) * radius;
                bubble.position.z = Math.sin(angle * 2) * 5;
                
                bubble.userData = {
                    originalY: bubble.position.y,
                    speed: 0.02 + Math.random() * 0.02,
                    offset: Math.random() * Math.PI * 2
                };
                
                sunGroup.add(bubble);
            }
            
            scene.add(sunGroup);
        }
        
        function createStarfield() {
            const geometry = new THREE.SphereGeometry(0.5, 4, 4);
            const material = new THREE.MeshBasicMaterial({ color: 0xffffff });
            starMesh = new THREE.InstancedMesh(geometry, material, 3000);
            
            const dummy = new THREE.Object3D();
            const colors = [];
            
            for (let i = 0; i < 3000; i++) {
                const radius = 200 + Math.random() * 600;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                dummy.position.set(
                    radius * Math.sin(phi) * Math.cos(theta),
                    radius * Math.sin(phi) * Math.sin(theta),
                    radius * Math.cos(phi)
                );
                dummy.scale.setScalar(0.5 + Math.random() * 1.5);
                dummy.updateMatrix();
                starMesh.setMatrixAt(i, dummy.matrix);
                
                const color = new THREE.Color();
                const colorChoice = Math.random();
                if (colorChoice < 0.3) color.setRGB(1, 0.4, 0.7);
                else if (colorChoice < 0.6) color.setRGB(1, 0.7, 0.8);
                else color.setRGB(1, 1, 1);
                starMesh.setColorAt(i, color);
            }
            
            starMesh.instanceMatrix.needsUpdate = true;
            starMesh.instanceColor.needsUpdate = true;
            scene.add(starMesh);
        }
        
        function createOrbitingApologyTexts() {
            apologyWords.forEach((word, index) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 512;
                canvas.height = 128;
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.font = 'bold 48px "Segoe UI", Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                ctx.shadowColor = '#ff69b4';
                ctx.shadowBlur = 20;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
                
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
                gradient.addColorStop(0, '#ff69b4');
                gradient.addColorStop(0.5, '#ffb6c1');
                gradient.addColorStop(1, '#ff1493');
                ctx.fillStyle = gradient;
                
                ctx.fillText(word, canvas.width / 2, canvas.height / 2);
                
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.lineWidth = 2;
                ctx.strokeText(word, canvas.width / 2, canvas.height / 2);
                
                const texture = new THREE.CanvasTexture(canvas);
                texture.needsUpdate = true;
                
                const material = new THREE.SpriteMaterial({
                    map: texture,
                    transparent: true,
                    opacity: 0.9,
                    blending: THREE.AdditiveBlending
                });
                
                const sprite = new THREE.Sprite(material);
                
                const orbitRadius = 35 + Math.random() * 15;
                const angle = (index / apologyWords.length) * Math.PI * 2;
                const height = (Math.random() - 0.5) * 20;
                
                sprite.position.x = Math.cos(angle) * orbitRadius;
                sprite.position.z = Math.sin(angle) * orbitRadius;
                sprite.position.y = height;
                
                sprite.scale.set(20, 5, 1);
                
                sprite.userData = {
                    orbitRadius: orbitRadius,
                    angle: angle,
                    speed: 0.005 + Math.random() * 0.005,
                    originalY: height,
                    floatSpeed: 0.5 + Math.random() * 0.5,
                    floatOffset: Math.random() * Math.PI * 2
                };
                
                scene.add(sprite);
                apologyTexts.push(sprite);
            });
        }
        
        function resizeTexture(texture, maxSize = 256) {
            const image = texture.image;
            if (!image) return texture;
            
            if (image.width > maxSize || image.height > maxSize) {
                const canvas = document.createElement('canvas');
                const scale = maxSize / Math.max(image.width, image.height);
                canvas.width = Math.floor(image.width * scale);
                canvas.height = Math.floor(image.height * scale);
                const ctx = canvas.getContext('2d');
                ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
                const newTexture = new THREE.CanvasTexture(canvas);
                newTexture.needsUpdate = true;
                return newTexture;
            }
            return texture;
        }
        
        function createPhotoGalaxy() {
            const textureLoader = new THREE.TextureLoader();
            const textures = [];
            let texturesLoaded = 0;
            
            imageUrls.forEach((url, index) => {
                textureLoader.load(
                    url,
                    (texture) => {
                        textures[index] = resizeTexture(texture, 256);
                        texturesLoaded++;
                        
                        if (texturesLoaded === imageUrls.length) {
                            createPhotosFromTextures(textures);
                            document.getElementById('loading').style.display = 'none';
                        }
                    },
                    undefined,
                    (error) => {
                        console.error('Error loading texture:', error);
                        texturesLoaded++;
                        if (texturesLoaded === imageUrls.length) {
                            createPhotosFromTextures(textures);
                            document.getElementById('loading').style.display = 'none';
                        }
                    }
                );
            });
        }
        
        function createPhotosFromTextures(textures) {
            const totalPhotos = 30;
            
            for (let i = 0; i < totalPhotos; i++) {
                const textureIndex = i % 10;
                const texture = textures[textureIndex];
                
                if (!texture) continue;
                
                const clonedTexture = texture.clone();
                clonedTexture.needsUpdate = true;
                
                const aspect = clonedTexture.image ? (clonedTexture.image.width / clonedTexture.image.height) : 1;
                const width = 10;
                const height = width / aspect;
                
                const geometry = new THREE.PlaneGeometry(width, height);
                const material = new THREE.MeshBasicMaterial({
                    map: clonedTexture,
                    side: THREE.DoubleSide,
                    transparent: true
                });
                
                const photo = new THREE.Mesh(geometry, material);
                
                const angle = (i / totalPhotos) * Math.PI * 8;
                const radius = 60 + (i / totalPhotos) * 120;
                const yOffset = (i - totalPhotos / 2) * 4 + Math.sin(angle) * 15;
                
                photo.position.x = Math.cos(angle) * radius;
                photo.position.z = Math.sin(angle) * radius;
                photo.position.y = yOffset;
                
                photo.userData = {
                    originalY: yOffset,
                    angle: angle,
                    radius: radius,
                    speed: 0.0005 + Math.random() * 0.001,
                    floatOffset: Math.random() * Math.PI * 2
                };
                
                photo.lookAt(0, 0, 0);
                
                scene.add(photo);
                photoMeshes.push(photo);
                
                const glowGeo = new THREE.PlaneGeometry(width + 2, height + 2);
                const glowMat = new THREE.MeshBasicMaterial({
                    color: 0xff69b4,
                    transparent: true,
                    opacity: 0.2,
                    side: THREE.DoubleSide
                });
                const glow = new THREE.Mesh(glowGeo, glowMat);
                glow.position.copy(photo.position);
                glow.position.z -= 0.1;
                glow.lookAt(0, 0, 0);
                scene.add(glow);
                
                photo.userData.glow = glow;
                
                const frameGeo = new THREE.PlaneGeometry(width + 0.5, height + 0.5);
                const frameMat = new THREE.MeshBasicMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.8,
                    side: THREE.BackSide
                });
                const frame = new THREE.Mesh(frameGeo, frameMat);
                frame.position.copy(photo.position);
                frame.position.z -= 0.05;
                frame.lookAt(0, 0, 0);
                scene.add(frame);
                photo.userData.frame = frame;
            }
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        let lastTime = 0;
        const targetFPS = 30;
        const frameInterval = 1000 / targetFPS;
        let frameCount = 0;
        
        function animate(currentTime) {
            requestAnimationFrame(animate);
            
            if (currentTime - lastTime < frameInterval) return;
            lastTime = currentTime;
            
            const time = currentTime * 0.001;
            frameCount++;
            
            if (sunGroup) {
                sunGroup.rotation.y += 0.002;
                
                sunGroup.children.forEach((child) => {
                    if (child.userData && child.userData.speed) {
                        child.position.y = child.userData.originalY + 
                            Math.sin(time * child.userData.speed + child.userData.offset) * 3;
                        const scale = 1 + Math.sin(time * 2 + child.userData.offset) * 0.2;
                        child.scale.setScalar(scale);
                    }
                });
            }
            
            apologyTexts.forEach((sprite) => {
                if (sprite.userData) {
                    sprite.userData.angle += sprite.userData.speed;
                    sprite.position.x = Math.cos(sprite.userData.angle) * sprite.userData.orbitRadius;
                    sprite.position.z = Math.sin(sprite.userData.angle) * sprite.userData.orbitRadius;
                    sprite.position.y = sprite.userData.originalY + 
                        Math.sin(time * sprite.userData.floatSpeed + sprite.userData.floatOffset) * 3;
                    sprite.lookAt(camera.position);
                    
                    const normalizedZ = sprite.position.z / sprite.userData.orbitRadius;
                    sprite.material.opacity = 0.6 + (normalizedZ + 1) * 0.2;
                }
            });
            
            if (frameCount % 2 === 0) {
                photoMeshes.forEach((photo) => {
                    if (photo.userData) {
                        photo.position.y = photo.userData.originalY + 
                            Math.sin(time * 0.5 + photo.userData.floatOffset) * 3;
                        
                        photo.userData.angle += photo.userData.speed * 2;
                        photo.position.x = Math.cos(photo.userData.angle) * photo.userData.radius;
                        photo.position.z = Math.sin(photo.userData.angle) * photo.userData.radius;
                        
                        photo.lookAt(camera.position);
                        
                        if (photo.userData.glow) {
                            photo.userData.glow.position.copy(photo.position);
                            photo.userData.glow.position.z -= 0.1;
                            photo.userData.glow.lookAt(camera.position);
                        }
                        
                        if (photo.userData.frame) {
                            photo.userData.frame.position.copy(photo.position);
                            photo.userData.frame.position.z -= 0.05;
                            photo.userData.frame.lookAt(camera.position);
                        }
                    }
                });
            }
            
            if (starMesh) {
                starMesh.rotation.y += 0.0002;
            }
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        document.getElementById('start-overlay').addEventListener('click', function() {
            this.style.display = 'none';
            
            init();
            
            audio = new Audio(musicUrl);
            audio.loop = true;
            audio.volume = 0.5;
            audio.play().catch(e => console.log('Audio autoplay blocked:', e));
        });
    </script>
</body>
</html>
